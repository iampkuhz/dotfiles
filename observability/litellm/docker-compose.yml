services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY
      - LANGFUSE_PUBLIC_KEY
      - LANGFUSE_SECRET_KEY
      - LITELLM_UPSTREAM_MODEL
      - LITELLM_UPSTREAM_BASE_URL
      - LITELLM_UPSTREAM_API_KEY
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@host.containers.internal:5433/postgres
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
