# LiteLLM 轻量代理 - Docker Compose 配置
# 定位：本地 AI 模型网关，单一容器，低内存占用
# 健康检查：4000 端口可访问即视为健康

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    # 环境变量从宿主机继承（确保启动前已 source ~/.env 或对应文件）
    environment:
      # ===== 基础配置（必需） =====
      - LITELLM_MASTER_KEY
      - LITELLM_OPENAI_QWEN_MODEL
      - LITELLM_ANTHROPIC_QWEN_MODEL
      - BAILIAN_CODING_PLAN_OPENAI_BASE_URL
      - BAILIAN_CODING_PLAN_ANTHROPIC_BASE_URL
      - BAILIAN_CODING_PLAN_API_KEY

      # ===== 网络配置（防止代理污染） =====
      # 容器内访问本地回环地址时不应经过代理
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=127.0.0.1,localhost,host.containers.internal
      - no_proxy=127.0.0.1,localhost,host.containers.internal
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      # 绕过 prisma db baseline_diff 检查
      - "--use_prisma_db_push"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    # 健康检查：4000 端口可访问即视为健康
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
