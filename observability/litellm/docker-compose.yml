# LiteLLM 轻量代理 - Docker Compose 配置
# 定位：本地 AI 模型网关，低内存占用
# 依赖：PostgreSQL（用于存储配置、日志、元数据）
# 健康检查：4000 端口可访问即视为健康

services:
  # PostgreSQL 数据库 - LiteLLM 必需的最小依赖
  postgres:
    image: docker.io/postgres:17
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm_password}
      POSTGRES_DB: litellm
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    networks:
      - litellm_network

  # LiteLLM Proxy - 模型网关
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    # 环境变量从宿主机继承（确保启动前已 source ~/.env 或对应文件）
    environment:
      # ===== 基础配置（必需） =====
      - LITELLM_MASTER_KEY
      - LITELLM_OPENAI_QWEN_MODEL
      - LITELLM_ANTHROPIC_QWEN_MODEL
      - BAILIAN_CODING_PLAN_OPENAI_BASE_URL
      - BAILIAN_CODING_PLAN_ANTHROPIC_BASE_URL
      - BAILIAN_CODING_PLAN_API_KEY
      # 容器内的 Prisma / LiteLLM 启动阶段会访问本地回环地址与宿主机端口。
      # 如果继承了宿主机的全局代理，这些内部请求会被错误转发，表现为 EngineRequestError: 502。
      # 这里显式清空代理，并补上本地直连白名单，避免本机服务被代理污染。
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=127.0.0.1,localhost,host.containers.internal
      - no_proxy=127.0.0.1,localhost,host.containers.internal
      # 这里单独使用 litellm 数据库，避免和 Langfuse 的 postgres 数据库冲突。
      # 容器内使用服务名 litellm-db 和端口 5432 连接
      # 注意：使用 litellm 用户（由 POSTGRES_USER 设置）而非 postgres 超级用户
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      # 这版 main-latest 在 prisma migrate + post-migration sanity check 阶段会反复生成 baseline_diff，
      # 导致服务一直卡在 startup。这里切换为 prisma db push，绕过有问题的迁移检查路径。
      - "--use_prisma_db_push"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - litellm_network

# 定义网络
networks:
  litellm_network:
    driver: bridge

# 定义数据卷
volumes:
  postgres_data:
    driver: local
