# LiteLLM 配置
# 定位：统一多模型代理，简洁配置，适合个人本地使用
# 观测：不强制依赖任何本地观测组件，未来可通过 OTel 接入云端平台

model_list:
  - model_name: os.environ/LITELLM_OPENAI_QWEN_MODEL
    litellm_params:
      # 百炼 OpenAI 兼容端点
      model: openai/qwen3.5-plus
      api_base: os.environ/BAILIAN_CODING_PLAN_OPENAI_BASE_URL
      api_key: os.environ/BAILIAN_CODING_PLAN_API_KEY

  - model_name: os.environ/LITELLM_ANTHROPIC_QWEN_MODEL
    litellm_params:
      # 百炼 Anthropic 兼容端点
      model: anthropic/qwen3.5-plus
      api_base: os.environ/BAILIAN_CODING_PLAN_ANTHROPIC_BASE_URL
      api_key: os.environ/BAILIAN_CODING_PLAN_API_KEY

litellm_settings:
  # ===== 观测回调 =====
  # 当前不配置任何本地观测回调
  # 未来接入 Braintrust / Arize AX 时，只需配置 OTel 环境变量：
  # - OTEL_EXPORTER_OTLP_ENDPOINT
  # - OTEL_EXPORTER_OTLP_HEADERS
  # - USE_OTEL_LITELLM_REQUEST_SPAN=true
  # LiteLLM 会自动输出标准 OTel spans

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  store_prompts_in_spend_logs: true
