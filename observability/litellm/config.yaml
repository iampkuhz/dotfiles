model_list:
  - model_name: chat-model
    litellm_params:
      model: os.environ/LITELLM_UPSTREAM_MODEL
      api_base: os.environ/LITELLM_UPSTREAM_BASE_URL
      api_key: os.environ/LITELLM_UPSTREAM_API_KEY

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_host: http://host.containers.internal:3000
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret: os.environ/LANGFUSE_SECRET_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  store_prompts_in_spend_logs: true
