use_default_settings: true

general:
  instance_name: "SearXNG"

server:
  secret_key: "searxng-secret-key"

outgoing:
  # 代理配置 - 用于大陆访问国外搜索引擎
  proxies:
    http: "http://127.0.0.1:7890"
    https: "http://127.0.0.1:7890"
  verify_ssl: true

engines:
  - name: google
    engine: google
    enabled: true
  - name: bing
    engine: bing
    enabled: true
  - name: duckduckgo
    engine: duckduckgo
    enabled: true
  - name: wikipedia
    engine: wikipedia
    enabled: true
  - name: github
    engine: github
    enabled: true
  - name: google images
    engine: google_images
    enabled: true
